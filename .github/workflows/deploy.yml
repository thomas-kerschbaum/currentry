# Deploys the static site to GitHub Pages on every push to main.
# No build step — the repo *is* the site, so we just upload it as-is.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate data (blocks deploy on bad data)
        run: node scripts/validate-data.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # upload the whole repo root (the static site)

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
