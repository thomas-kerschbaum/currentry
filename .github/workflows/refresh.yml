# Refreshes the news feed and republishes the site.
#
# Trigger it on demand from the Actions tab ("Run workflow"), or let the
# schedule run it. It regenerates data/news.json, commits the change, and
# deploys to GitHub Pages in the same job — so an open News tab picks up the
# new data on its next poll, and new visitors get it immediately.
name: Refresh news & deploy

on:
  workflow_dispatch: # the "whenever I run it" button
  schedule:
    - cron: "0 */6 * * *" # every 6 hours (UTC) — adjust to taste

permissions:
  contents: write # to commit the refreshed data file
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate news feed
        run: node scripts/refresh-news.mjs

      - name: Validate data (blocks deploy on bad data)
        run: node scripts/validate-data.mjs

      - name: Commit refreshed feed (if changed)
        run: |
          git config user.name "currentry-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json
          if git diff --staged --quiet; then
            echo "No feed changes."
          else
            git commit -m "chore: refresh news feed [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
